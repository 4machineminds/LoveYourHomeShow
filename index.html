<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euro Prestige – Love Your Home Show</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #1a1a2e;
    --mid: #16213e;
    --surface: #0f3460;
    --white: #f5f0e8;
    --muted: #a09080;
    --border: rgba(201,168,76,0.3);
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(15,52,96,0.6) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    color: var(--white);
    padding: 2rem 1rem 4rem;
  }

  .card {
    max-width: 780px;
    margin: 0 auto;
    background: linear-gradient(145deg, #1e1e3a 0%, #16213e 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.1);
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f1c3f 0%, #1a1a2e 60%, #0d2137 100%);
    padding: 2rem 2.5rem 2rem;
    border-bottom: 2px solid var(--gold);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .header-left { flex: 1; min-width: 0; }

  .header-logo {
    flex-shrink: 0;
    height: 90px;
    width: auto;
    mix-blend-mode: screen;
    filter: brightness(1.05);
  }

  @media(max-width: 600px) {
    .header-logo { height: 70px; order: 1; }
    .header-inner { 
      flex-direction: column; 
      align-items: center; 
      text-align: center;
      gap: 0.75rem;
    }
    .header-left { width: 100%; order: 2; }
    .tagline { display: none; }
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .tagline span { color: var(--gold); }

  /* FORM BODY */
  .form-body { padding: 2rem 2.5rem 2.5rem; }

  /* SECTION LABELS */
  .section-label {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section { margin-bottom: 1.8rem; }

  /* INPUTS */
  .field-group { display: grid; gap: 1rem; }
  .field-group.two-col { grid-template-columns: 1fr 1fr; }
  @media(max-width: 520px) { .field-group.two-col { grid-template-columns: 1fr; } }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .field label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input,
  .field textarea {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--white);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    outline: none;
    width: 100%;
  }

  .field input::placeholder,
  .field textarea::placeholder { color: rgba(245,240,232,0.2); }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .field textarea { resize: vertical; min-height: 90px; }

  /* CHECKBOX GROUPS */
  .check-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }

  .check-item input[type="checkbox"] { display: none; }

  .check-box {
    width: 36px; height: 36px;
    border: 1.5px solid rgba(201,168,76,0.35);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    display: grid;
    place-items: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .check-box svg {
    width: 16px; height: 16px;
    stroke: var(--gold);
    stroke-width: 2.5;
    fill: none;
    opacity: 0;
    transform: scale(0.6);
    transition: all 0.2s;
  }

  .check-item input:checked + .check-box {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }

  .check-item input:checked + .check-box svg {
    opacity: 1;
    transform: scale(1);
  }

  .check-label {
    font-size: 0.88rem;
    font-weight: 400;
    color: rgba(245,240,232,0.8);
    transition: color 0.2s;
    user-select: none;
  }

  .check-item:hover .check-label { color: var(--white); }
  .check-item input:checked ~ .check-label { color: var(--gold-light); font-weight: 700; }

  /* OTHER CUSTOM FIELD */
  .other-field {
    display: none;
    margin-top: 0.75rem;
    animation: fadeUp 0.25s ease both;
  }

  .other-field.visible { display: block; }

  .other-field input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--white);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    outline: none;
    width: 100%;
    border-left: 3px solid var(--gold);
  }

  .other-field input::placeholder { color: rgba(245,240,232,0.25); }

  .other-field input:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  /* CONSENT */
  .consent-row {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 1rem 1.2rem;
    background: rgba(201,168,76,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.8rem;
    cursor: pointer;
  }

  .consent-row input { display: none; }

  .consent-box {
    width: 22px; height: 22px;
    border: 1.5px solid rgba(201,168,76,0.4);
    border-radius: 5px;
    background: rgba(255,255,255,0.03);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
  }

  .consent-box svg {
    width: 12px; height: 12px;
    stroke: var(--gold);
    stroke-width: 3;
    fill: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .consent-row input:checked + .consent-box {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }
  .consent-row input:checked + .consent-box svg { opacity: 1; }

  .consent-text {
    font-size: 0.85rem;
    color: rgba(245,240,232,0.7);
    line-height: 1.5;
  }

  /* SIGNATURE DATE */
  .sig-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  @media(max-width: 480px) { .sig-row { grid-template-columns: 1fr; } }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%;
    padding: 1.1rem;
    background: linear-gradient(135deg, var(--gold) 0%, #b8902e 100%);
    border: none;
    border-radius: var(--radius);
    color: #1a1400;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .save-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }
  .save-btn:hover::before { opacity: 1; }
  .save-btn:active { transform: translateY(0); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    display: none;
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e3a1e;
    border: 1px solid #4caf50;
    color: #a5d6a7;
    padding: 0.85rem 1.5rem;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    z-index: 9999;
    animation: toastIn 0.4s ease forwards;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  .toast.error { background: #3a1e1e; border-color: #f44336; color: #ef9a9a; }

  @keyframes toastIn {
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.8rem 0;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(26,20,0,0.3);
    border-top-color: #1a1400;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

      <div class="check-grid">
        <label class="check-item">
          <input type="checkbox" name="budget" value="€200–350k">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">€200–350k</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="budget" value="€350–500k">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">€350–500k</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="budget" value="€500k+">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">€500k+</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="budget" value="Other" id="budgetOtherCheck">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">Other</span>
        </label>
      </div>
      <div class="other-field" id="budgetOtherField">
        <input type="text" name="budgetOther" id="budgetOther" placeholder="Please specify your budget…">
      </div>
    </div>

    <div class="divider"></div>

    <!-- WHEN TO BUY -->
    <div class="section">
      <div class="section-label">When Are You Looking to Buy?</div>
      <div class="check-grid">
        <label class="check-item">
          <input type="checkbox" name="timeline" value="0–3 Months">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">0–3 Months</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="timeline" value="3–6 Months">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">3–6 Months</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="timeline" value="6–12 Months">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">6–12 Months</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="timeline" value="12+ Months">
          <span class="check-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="check-label">12+ Months</span>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- NOTES -->
    <div class="section">
      <div class="section-label">Notes</div>
      <div class="field">
        <textarea id="notes" name="notes" placeholder="Any additional information or questions…"></textarea>
      </div>
    </div>

    <div class="divider"></div>

    <!-- CONSENT -->
    <label class="consent-row">
      <input type="checkbox" id="consent" name="consent" value="true">
      <span class="consent-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
      <span class="consent-text">I agree to be contacted by Euro Prestige regarding Spanish property opportunities.</span>
    </label>

    <!-- SIGNATURE & DATE -->
    <div class="sig-row">
      <div class="field">
        <label for="signature">Signature (Full Name)</label>
        <input type="text" id="signature" name="signature" placeholder="Type your full name as signature">
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" name="date">
      </div>
    </div>

    <!-- SAVE BUTTON -->
    <button type="submit" class="save-btn" id="saveBtn">SAVE</button>

  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  // Pre-fill today's date
  document.getElementById('date').valueAsDate = new Date();

  const WEBHOOK_URL = 'https://machinemindspvt.app.n8n.cloud/webhook/clienttest'; // <-- Replace with your n8n webhook URL

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type === 'error' ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  function getChecked(name) {
    return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(el => el.value);
  }

  // Toggle "Other" custom input fields
  function setupOtherToggle(checkId, fieldId) {
    const cb = document.getElementById(checkId);
    const field = document.getElementById(fieldId);
    if (!cb || !field) return;
    cb.addEventListener('change', () => {
      field.classList.toggle('visible', cb.checked);
      if (!cb.checked) field.querySelector('input').value = '';
    });
  }

  setupOtherToggle('areaOtherCheck', 'areaOtherField');
  setupOtherToggle('propOtherCheck', 'propOtherField');
  setupOtherToggle('budgetOtherCheck', 'budgetOtherField');

  document.getElementById('mainForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!fullName) { showToast('⚠ Please enter your full name.', 'error'); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('⚠ Please enter a valid email address.', 'error'); return; }

    const payload = {
      fullName,
      email,
      mobile: document.getElementById('mobile').value.trim(),
      plansForSpain: getChecked('plans'),
      area: getChecked('area'),
      propertyType: getChecked('propertyType'),
      budget: getChecked('budget'),
      timeline: getChecked('timeline'),
      notes: document.getElementById('notes').value.trim(),
      areaCustom: document.getElementById('areaOther').value.trim(),
      propertyTypeCustom: document.getElementById('propOther').value.trim(),
      budgetCustom: document.getElementById('budgetOther').value.trim(),
      consent: document.getElementById('consent').checked,
      signature: document.getElementById('signature').value.trim(),
      date: document.getElementById('date').value,
      submittedAt: new Date().toISOString()
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving…';

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        showToast('✓ Details saved successfully!');
        document.getElementById('mainForm').reset();
        document.getElementById('date').valueAsDate = new Date();
      } else {
        throw new Error('Server responded with ' + res.status);
      }
    } catch (err) {
      console.error(err);
      showToast('✗ Failed to save. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'SAVE';
    }
  });
</script>
</body>
</html>
